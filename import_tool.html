  {"id":"match_20260615_001","league":"英超","leagueIcon":"🏴󠁧󠁥󠁮󠁧󠁿","time":"2026-06-15 21:00","date":"2026-06-15","homeTeam":"曼联","homeTeamLogo":"🔴","awayTeam":"利物浦","awayTeamLogo":"🔵","locked":true,"confidence":68,"recommend":"大球 2.5","expectedGoals":"3.12","handicap":"2.5","analysis":"曼联主场进攻活跃，近5场场均进球2.1个。利物浦客场防守有漏洞，近3个客场失球5个。模型预测总进球3.12个，推荐大球2.5。","ended":false,"live":false},
  {"id":"match_20260615_002","league":"西甲","leagueIcon":"🇪🇸","time":"2026-06-15 23:00","date":"2026-06-15","homeTeam":"巴塞罗那","homeTeamLogo":"🔴","awayTeam":"皇家马德里","awayTeamLogo":"⚪","locked":true,"confidence":72,"recommend":"大球 2.5","expectedGoals":"3.45","handicap":"2.5","analysis":"国家德比，双方进攻火力强劲。巴萨主场近10场场均进球2.8个，皇马客场场均进球2.3个。模型预期总进球3.45个，推荐大球2.5。","ended":false,"live":false},

function log(msg, type='info') {
  const el = document.getElementById('log');
  const item = document.createElement('div');
  item.className = 'log-item ' + type;
  item.textContent = msg;
  el.appendChild(item);
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

async function importData() {
  document.getElementById('step1').style.display = 'none';
  showStatus('正在连接数据库...', 'info');

  try {
    // 导入赛事
    for (const match of matches) {
      await db.collection('matches').doc(match.id).set(match);
      log(`✅ ${match.homeTeam} vs ${match.awayTeam}`, 'ok');
    }
    log(`📊 共导入 ${matches.length} 场赛事`, 'ok');

    // 创建管理员
    const crypto = await import('https://esm.sh/crypto-js@4.2.0');
    // 简单SHA256
    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const passwordHash = await sha256('admin888' + 'ai_football_salt');
    await db.collection('admins').doc('admin').set({
      username: 'admin',
      password: passwordHash,
      role: 'admin',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    log('✅ 管理员账号 admin/admin888 已创建', 'ok');

    // 创建默认设置
    await db.collection('settings').doc('config').set({
      diamondPerRegister: 8,
      diamondPerCheckin: 1,
      diamondPerUnlock: 1,
      getDiamondUrl: ''
    });
    log('✅ 默认设置已创建', 'ok');

    showStatus('🎉 数据导入完成！', 'success');
    document.getElementById('step2').style.display = 'block';

  } catch (e) {
    log('❌ 错误: ' + e.message, 'err');
    showStatus('导入失败，请检查 Firestore 是否已启用', 'error');
    document.getElementById('step1').style.display = 'block';
  }
}
</script>
