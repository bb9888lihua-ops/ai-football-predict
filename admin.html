<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoalMind - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#0a0e17 0%,#1a1f2e 100%);color:#e8eaf0;min-height:100vh}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#1e293b;color:#e8eaf0;padding:12px 24px;border-radius:12px;font-size:14px;z-index:10000;transition:transform 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#10b981}
.toast.error{background:#ef4444}
.toast.info{background:#3b82f6}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:16px;padding:32px;width:360px;text-align:center}
.login-box h2{font-size:22px;margin-bottom:8px;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-box p{font-size:13px;color:#7a8bb5;margin-bottom:24px}
.login-box input{width:100%;background:#0a0e17;border:1px solid #1e2a4a;border-radius:10px;padding:12px 16px;color:#e8eaf0;font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:#10b981}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#3b82f6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.login-box button:hover{opacity:0.9}
.login-error{color:#ef4444;font-size:13px;margin-top:8px;display:none}

/* Admin page */
.admin-page{min-height:100vh;display:none}
.admin-topbar{background:rgba(10,14,23,0.95);backdrop-filter:blur(10px);border-bottom:1px solid #1e2a4a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.admin-topbar h2{font-size:20px;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-container{max-width:1200px;margin:0 auto;padding:24px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-size:32px;font-weight:700;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .label{font-size:12px;color:#7a8bb5;margin-top:4px}

/* Section */
.admin-section-title{font-size:16px;font-weight:600;margin:24px 0 16px;display:flex;align-items:center;gap:8px}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#10b981,#3b82f6);color:#fff}
.btn-gold{background:#fbbf24;color:#0a0e17}
.btn-danger{background:#ef4444;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-logout{background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-back{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}

/* Table */
.member-table{width:100%;border-collapse:collapse;background:linear-gradient(145deg,#141929,#0f1422);border-radius:12px;overflow:hidden}
.member-table th{background:#0a0e17;padding:12px;text-align:left;font-size:12px;color:#7a8bb5;font-weight:600}
.member-table td{padding:12px;border-top:1px solid #1e2a4a;font-size:13px}
.member-table tr:hover{background:rgba(16,185,129,0.05)}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:#7a8bb5;margin-bottom:6px}
.form-input{width:100%;background:#0a0e17;border:1px solid #1e2a4a;border-radius:10px;padding:12px 16px;color:#e8eaf0;font-size:14px}
.form-input:focus{outline:none;border-color:#10b981}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:16px;max-width:400px;width:90%}
.modal-header{padding:16px 20px;border-bottom:1px solid #1e2a4a;display:flex;justify-content:space-between;align-items:center}
.modal-header span:first-child{font-size:16px;font-weight:600}
.modal-close{cursor:pointer;color:#7a8bb5;font-size:20px}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid #1e2a4a;display:flex;gap:12px;justify-content:flex-end}

/* Search */
.search-bar{display:flex;gap:12px;margin-bottom:16px}
.search-bar input{flex:1;background:#0a0e17;border:1px solid #1e2a4a;border-radius:10px;padding:10px 16px;color:#e8eaf0;font-size:14px}
.search-bar input:focus{outline:none;border-color:#10b981}

/* Detail panel */
.detail-panel{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:12px;padding:20px;margin-top:16px;display:none}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;font-size:13px}
.detail-grid .label{color:#7a8bb5}
.detail-grid .value{font-weight:600;margin-top:2px}

/* Unlocked list */
.unlocked-list{margin-top:16px}
.unlocked-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(16,185,129,0.05);border:1px solid #1e2a4a;border-radius:8px;margin-bottom:6px;font-size:12px}

@media(max-width:768px){
  .admin-topbar{flex-direction:column;gap:12px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .member-table{font-size:12px}
  .member-table th,.member-table td{padding:8px}
  .search-bar{flex-direction:column}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
  <h2>⚙️ 管理后台</h2>
  <p>GoalMind AI足势 管理系统</p>
  <input type="text" id="adminUser" placeholder="管理员账号" autocomplete="username">
  <input type="password" id="adminPass" placeholder="密码" autocomplete="current-password">
  <button onclick="doLogin()">登 录</button>
  <div class="login-error" id="loginError"></div>
</div>
</div>

<!-- Admin Panel -->
<div class="admin-page" id="adminPage">
<div class="admin-topbar">
  <h2>⚙️ GoalMind 管理后台</h2>
  <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:12px;color:#7a8bb5" id="adminWelcome"></span>
    <a href="index.html" class="btn-back">返回前台</a>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
</div>
<div class="admin-container">

<!-- Stats -->
<div class="stat-grid">
  <div class="stat-card"><div class="num" id="statUsers">0</div><div class="label">注册用户</div></div>
  <div class="stat-card"><div class="num" id="statCredits">0</div><div class="label">累计发放积分</div></div>
  <div class="stat-card"><div class="num" id="statUnlocks">0</div><div class="label">累计解锁次数</div></div>
  <div class="stat-card"><div class="num" id="statActive">0</div><div class="label">有积分用户</div></div>
</div>

<!-- Quick add credits -->
<div class="admin-section-title">💰 快速添加积分</div>
<div style="background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:12px;padding:20px;margin-bottom:24px">
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
    <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0">
      <label>用户名</label>
      <input class="form-input" id="quickUser" placeholder="输入用户名" list="userDatalist">
      <datalist id="userDatalist"></datalist>
    </div>
    <div class="form-group" style="width:120px;margin-bottom:0">
      <label>积分数量</label>
      <input class="form-input" id="quickAmount" type="number" value="10" min="1">
    </div>
    <button class="btn btn-gold" onclick="quickAddCredits()" style="height:44px">💰 添加积分</button>
  </div>
</div>

<!-- Members -->
<div class="admin-section-title">👥 会员列表</div>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索用户名或手机号..." oninput="filterMembers()">
</div>
<div style="overflow-x:auto">
<table class="member-table">
  <thead><tr>
    <th>用户名</th>
    <th>手机号</th>
    <th>剩余积分</th>
    <th>已解锁</th>
    <th>注册时间</th>
    <th>操作</th>
  </tr></thead>
  <tbody id="memberTbody"></tbody>
</table>
</div>

<!-- User Detail -->
<div class="detail-panel" id="detailPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 style="font-size:15px">📋 <span id="detailUser"></span> 的详情</h3>
    <span style="cursor:pointer;color:#7a8bb5;font-size:18px" onclick="document.getElementById('detailPanel').style.display='none'">✕</span>
  </div>
  <div class="detail-grid" id="detailInfo"></div>
  <div class="unlocked-list" id="detailUnlocked"></div>
</div>

</div>
</div>

<!-- Add Credits Modal -->
<div class="modal-overlay" id="addModal" style="display:none">
<div class="modal-box">
  <div class="modal-header">
    <span>💰 添加积分</span>
    <span class="modal-close" onclick="hideAddModal()">✕</span>
  </div>
  <div class="modal-body">
    <div style="font-size:13px;color:#7a8bb5;margin-bottom:12px">用户: <span id="addModalUser" style="color:#fbbf24;font-weight:600"></span></div>
    <div class="form-group">
      <label>积分数量</label>
      <input class="form-input" id="addModalAmount" type="number" value="10" min="1">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-primary" onclick="confirmAddCredits()">确认添加</button>
    <button class="btn-sm" style="background:#1e2a4a;color:#7a8bb5;border:none;padding:8px 16px;border-radius:8px" onclick="hideAddModal()">取消</button>
  </div>
</div>
</div>

<script>
// ===== Config =====
const USERS_KEY = 'aifushi_users';
const ADMIN_KEY = 'aifushi_admin_session';
const ADMIN_ACCOUNTS = {
  'admin': 'admin888',
  'bb9888': 'bb9888'
};

// ===== Utils =====
function showToast(msg, type) {
  type = type || 'info';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function fmtDate(ts) {
  if (!ts) return '-';
  var d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

// ===== Auth =====
function getAdminSession() {
  try { return JSON.parse(localStorage.getItem(ADMIN_KEY)); }
  catch(e) { return null; }
}

function doLogin() {
  var user = document.getElementById('adminUser').value.trim();
  var pass = document.getElementById('adminPass').value;
  var errEl = document.getElementById('loginError');

  if (!user || !pass) {
    errEl.textContent = '请输入账号和密码';
    errEl.style.display = 'block';
    return;
  }

  if (ADMIN_ACCOUNTS[user] && ADMIN_ACCOUNTS[user] === pass) {
    localStorage.setItem(ADMIN_KEY, JSON.stringify({ username: user, loginAt: new Date().toISOString() }));
    showAdminPanel();
  } else {
    errEl.textContent = '账号或密码错误';
    errEl.style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem(ADMIN_KEY);
  location.reload();
}

// ===== Admin Panel =====
function showAdminPanel() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  var session = getAdminSession();
  document.getElementById('adminWelcome').textContent = '管理员: ' + (session ? session.username : '');
  loadAllData();
}

function loadAllData() {
  var users = getUsers();
  var entries = Object.entries(users);

  // Stats
  var totalUsers = entries.length;
  var totalCredits = 0;
  var totalUnlocks = 0;
  var activeUsers = 0;

  entries.forEach(function(entry) {
    var u = entry[1];
    var credits = u.credits || 0;
    var unlocked = (u.unlocked || []).length;
    totalCredits += credits;
    totalUnlocks += unlocked;
    if (credits > 0) activeUsers++;
  });

  document.getElementById('statUsers').textContent = totalUsers;
  document.getElementById('statCredits').textContent = totalCredits;
  document.getElementById('statUnlocks').textContent = totalUnlocks;
  document.getElementById('statActive').textContent = activeUsers;

  // Update datalist
  var datalist = document.getElementById('userDatalist');
  datalist.innerHTML = entries.map(function(e) { return '<option value="' + e[0] + '">'; }).join('');

  // Render table
  renderMembers(entries);
}

function renderMembers(entries) {
  var tbody = document.getElementById('memberTbody');

  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#4a5578;padding:40px">暂无注册用户</td></tr>';
    return;
  }

  // Sort by registration time, newest first
  entries.sort(function(a, b) {
    return (b[1].createdAt || '').localeCompare(a[1].createdAt || '');
  });

  tbody.innerHTML = entries.map(function(entry) {
    var name = entry[0];
    var u = entry[1];
    var credits = u.credits || 0;
    var unlocked = (u.unlocked || []).length;
    var phone = u.phone || '-';
    var time = fmtDate(u.createdAt);

    return '<tr>' +
      '<td style="font-weight:600">' + name + '</td>' +
      '<td>' + phone + '</td>' +
      '<td style="color:' + (credits > 0 ? '#fbbf24' : '#ef4444') + ';font-weight:600">' + credits + '</td>' +
      '<td>' + unlocked + ' 场</td>' +
      '<td style="color:#7a8bb5">' + time + '</td>' +
      '<td>' +
        '<button class="btn-sm btn-gold" onclick="showAddModal(\'' + name + '\')">加积分</button> ' +
        '<button class="btn-sm btn-primary" onclick="showDetail(\'' + name + '\')">详情</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function filterMembers() {
  var query = document.getElementById('searchInput').value.trim().toLowerCase();
  var users = getUsers();
  var entries = Object.entries(users);

  if (query) {
    entries = entries.filter(function(entry) {
      return entry[0].toLowerCase().indexOf(query) >= 0 ||
             (entry[1].phone && entry[1].phone.indexOf(query) >= 0);
    });
  }

  renderMembers(entries);
}

// ===== Add Credits =====
var currentAddUser = '';

function showAddModal(username) {
  currentAddUser = username;
  document.getElementById('addModalUser').textContent = username;
  document.getElementById('addModalAmount').value = 10;
  document.getElementById('addModal').style.display = 'flex';
}

function hideAddModal() {
  document.getElementById('addModal').style.display = 'none';
  currentAddUser = '';
}

function confirmAddCredits() {
  if (!currentAddUser) return;
  var amount = parseInt(document.getElementById('addModalAmount').value) || 0;
  if (amount <= 0) {
    showToast('请输入有效的积分数量', 'error');
    return;
  }

  var users = getUsers();
  if (!users[currentAddUser]) {
    showToast('用户不存在', 'error');
    hideAddModal();
    return;
  }

  users[currentAddUser].credits = (users[currentAddUser].credits || 0) + amount;
  saveUsers(users);

  showToast('已给 ' + currentAddUser + ' 添加 ' + amount + ' 积分', 'success');
  hideAddModal();
  loadAllData();
}

function quickAddCredits() {
  var username = document.getElementById('quickUser').value.trim();
  var amount = parseInt(document.getElementById('quickAmount').value) || 0;

  if (!username) {
    showToast('请输入用户名', 'error');
    return;
  }
  if (amount <= 0) {
    showToast('请输入有效的积分数量', 'error');
    return;
  }

  var users = getUsers();
  if (!users[username]) {
    showToast('用户 "' + username + '" 不存在', 'error');
    return;
  }

  users[username].credits = (users[username].credits || 0) + amount;
  saveUsers(users);

  showToast('已给 ' + username + ' 添加 ' + amount + ' 积分，当前余额: ' + users[username].credits, 'success');
  document.getElementById('quickUser').value = '';
  loadAllData();
}

// ===== User Detail =====
function showDetail(username) {
  var users = getUsers();
  var u = users[username];
  if (!u) {
    showToast('用户不存在', 'error');
    return;
  }

  document.getElementById('detailUser').textContent = username;

  var credits = u.credits || 0;
  var unlocked = u.unlocked || [];
  var phone = u.phone || '-';
  var time = fmtDate(u.createdAt);

  document.getElementById('detailInfo').innerHTML =
    '<div><span class="label">手机号</span><div class="value">' + phone + '</div></div>' +
    '<div><span class="label">剩余积分</span><div class="value" style="color:#fbbf24">' + credits + '</div></div>' +
    '<div><span class="label">已解锁场次</span><div class="value">' + unlocked.length + ' 场</div></div>' +
    '<div><span class="label">注册时间</span><div class="value">' + time + '</div></div>';

  // Show unlocked matches
  if (unlocked.length > 0) {
    document.getElementById('detailUnlocked').innerHTML =
      '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#7a8bb5">已解锁的比赛:</div>' +
      unlocked.map(function(id) {
        return '<div class="unlocked-item"><span>' + id + '</span><span style="color:#10b981">✅</span></div>';
      }).join('');
  } else {
    document.getElementById('detailUnlocked').innerHTML =
      '<div style="font-size:12px;color:#4a5578;margin-top:8px">暂无解锁记录</div>';
  }

  document.getElementById('detailPanel').style.display = 'block';
}

// ===== Init =====
(function() {
  var session = getAdminSession();
  if (session && session.username && ADMIN_ACCOUNTS[session.username]) {
    showAdminPanel();
  }

  // Enter key on login
  document.getElementById('adminPass').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('adminUser').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('adminPass').focus();
  });
})();
</script>
</body>
</html>
