<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI足势 - 智能足球赛事预测</title>
<meta name="description" content="AI足势 - 基于Dixon-Coles泊松分布模型的专业足球赛事预测分析平台">
<meta name="theme-color" content="#0a0e17">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#0a0e17 0%,#1a1f2e 100%);color:#e8eaf0;min-height:100vh;overflow-x:hidden}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#1e293b;color:#e8eaf0;padding:12px 24px;border-radius:12px;font-size:14px;z-index:10000;transition:transform 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#10b981}
.toast.error{background:#ef4444}

/* Header */
.header{text-align:center;padding:40px 20px 20px}
.header h1{font-size:36px;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.header .subtitle{font-size:14px;color:#7a8bb5;margin-bottom:4px}
.header .update{font-size:12px;color:#4a5578}

/* Container */
.container{max-width:800px;margin:0 auto;padding:20px}

/* Stats bar */
.stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:12px;padding:14px 18px;flex:1;min-width:120px;text-align:center}
.stat-value{font-size:24px;font-weight:700;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:#7a8bb5;margin-top:4px}

/* Match cards */
.match-card{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:16px;padding:20px;margin-bottom:16px;transition:all 0.3s}
.match-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.match-league{display:flex;align-items:center;gap:8px}
.league-icon{font-size:20px}
.league-name{font-size:13px;color:#7a8bb5}
.match-time{font-size:12px;color:#4a5578}

.match-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.team-logo{width:48px;height:48px;border-radius:50%;background:#1e2a4a;display:flex;align-items:center;justify-content:center;font-size:24px}
.team-name{font-size:14px;font-weight:600;text-align:center}
.vs-text{font-size:20px;font-weight:700;color:#4a5578}

.match-prediction{background:#0a0e17;border-radius:12px;padding:16px;margin-bottom:12px}
.prediction-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prediction-title{font-size:13px;color:#7a8bb5}
.prediction-confidence{font-size:12px;padding:4px 10px;border-radius:6px;background:linear-gradient(135deg,#10b981,#3b82f6);color:#fff;font-weight:600}
.prediction-content{display:flex;justify-content:space-around;text-align:center}
.prediction-item{flex:1}
.prediction-label{font-size:11px;color:#4a5578;margin-bottom:4px}
.prediction-value{font-size:18px;font-weight:700;color:#10b981}
.prediction-value.blue{color:#3b82f6}

.match-analysis{background:#0a0e17;border-radius:12px;padding:16px}
.analysis-title{font-size:13px;color:#7a8bb5;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.analysis-text{font-size:13px;color:#e8eaf0;line-height:1.6}

/* Summary card */
.summary-card{background:linear-gradient(145deg,#141929,#0f1422);border:1px solid #1e2a4a;border-radius:16px;padding:20px;margin-top:24px}
.summary-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-item{text-align:center}

/* No matches */
.no-matches{text-align:center;padding:60px 20px;color:#4a5578}
.no-matches-icon{font-size:64px;margin-bottom:16px;opacity:0.5}
.no-matches-text{font-size:14px}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:#4a5578}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#10b981;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;padding:40px 20px;color:#4a5578;font-size:12px}
.footer a{color:#10b981;text-decoration:none}

/* Responsive */
@media(max-width:640px){
  .header h1{font-size:28px}
  .stats-bar{flex-direction:column}
  .summary-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <h1>AI足势</h1>
  <div class="subtitle">智能足球赛事预测系统</div>
  <div class="update">Dixon-Coles泊松分布模型 · 数据驱动分析</div>
</div>

<div class="container">
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">今日赛事</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-confidence">-</div><div class="stat-label">平均信心</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-over">-</div><div class="stat-label">大球推荐</div></div>
  </div>

  <div id="matchCards">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>正在加载赛事数据...</p>
    </div>
  </div>

  <div id="summaryCard"></div>

  <div class="footer">
    AI足势 · 基于Dixon-Coles泊松分布模型的智能预测引擎<br>
    <span style="margin-top:8px;display:inline-block">Powered by 神灯预测模型 · <a href="admin.html">管理后台</a></span>
  </div>
</div>

<script>
// Team emoji mapping
const teamEmojis = {
  '北京国安':'🟢','上海海港':'🔵','山东泰山':'🟠','广州队':'🔴',
  '成都蓉城':'🟣','浙江队':'🔷','武汉三镇':'🟤','长春亚泰':'⚪',
  '天津津门虎':'🟡','河南队':'🟤','深圳队':'🔵','大连人':'⚫',
  '曼城':'🩵','阿森纳':'🔴','利物浦':'🔴','切尔西':'🔵',
  '曼联':'🔴','热刺':'⚪','纽卡斯尔':'⚫','布莱顿':'🔵',
  '皇马':'⚪','巴萨':'🔵','马竞':'🔴','拜仁':'🔴',
  '巴黎':'🔵','国米':'🔵','AC米兰':'🔴','尤文':'⚪',
  '多特':'🟡','勒沃库森':'🔴','那不勒斯':'🔵',
};

function getTeamEmoji(team) {
  for (const [key, emoji] of Object.entries(teamEmojis)) {
    if (team.includes(key) || key.includes(team)) return emoji;
  }
  return '⚽';
}

function getLeagueIcon(league) {
  const icons = {
    '中超':'🇨🇳','英超':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','西甲':'🇪🇸','德甲':'🇩🇪',
    '意甲':'🇮🇹','法甲':'🇫🇷','欧冠':'🏆','欧联':'🏆',
    '韩K':'🇰🇷','日职':'🇯🇵','瑞典':'🇸🇪','挪威':'🇳🇴',
    '芬超':'🇫🇮','冰岛':'🇮🇸',
  };
  for (const [key, icon] of Object.entries(icons)) {
    if (league.includes(key)) return icon;
  }
  return '⚽';
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', 2500);
}

function renderMatches(matches) {
  const container = document.getElementById('matchCards');

  if (!matches || matches.length === 0) {
    container.innerHTML = '<div class="no-matches"><div class="no-matches-icon">⚽</div><div class="no-matches-text">暂无赛事数据<br>请等待系统更新预测</div></div>';
    document.getElementById('statsBar').style.display = 'none';
    return;
  }

  // Update stats
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('stat-total').textContent = matches.length;
  const avgConf = matches.reduce((s, m) => s + (m.confidence || 0), 0) / matches.length;
  document.getElementById('stat-confidence').textContent = Math.round(avgConf) + '%';
  const overCount = matches.filter(m => {
    const r = (m.recommend || '').toLowerCase();
    return r.includes('大') || r.includes('over');
  }).length;
  document.getElementById('stat-over').textContent = overCount;

  // Render match cards
  container.innerHTML = matches.map(m => {
    const homeEmoji = (m.homeTeamLogo && m.homeTeamLogo.length <= 2) ? m.homeTeamLogo : getTeamEmoji(m.homeTeam || '');
    const awayEmoji = (m.awayTeamLogo && m.awayTeamLogo.length <= 2) ? m.awayTeamLogo : getTeamEmoji(m.awayTeam || '');
    const leagueIcon = m.leagueIcon || getLeagueIcon(m.league || '');

    return `
<div class="match-card">
  <div class="match-header">
    <div class="match-league">
      <span class="league-icon">${leagueIcon}</span>
      <span class="league-name">${m.league || '足球赛事'}</span>
    </div>
    <div class="match-time">${m.date || ''} ${m.time || ''}</div>
  </div>
  <div class="match-teams">
    <div class="team">
      <div class="team-logo">${homeEmoji}</div>
      <div class="team-name">${m.homeTeam || '主队'}</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="team">
      <div class="team-logo">${awayEmoji}</div>
      <div class="team-name">${m.awayTeam || '客队'}</div>
    </div>
  </div>
  <div class="match-prediction">
    <div class="prediction-header">
      <span class="prediction-title">🤖 AI预测</span>
      <span class="prediction-confidence">${m.confidence || '--'}%</span>
    </div>
    <div class="prediction-content">
      <div class="prediction-item">
        <div class="prediction-label">推荐</div>
        <div class="prediction-value">${m.recommend || '--'}</div>
      </div>
      <div class="prediction-item">
        <div class="prediction-label">预期进球</div>
        <div class="prediction-value blue">${m.expectedGoals || '--'}</div>
      </div>
      <div class="prediction-item">
        <div class="prediction-label">盘口</div>
        <div class="prediction-value">${m.handicap || '--'}</div>
      </div>
    </div>
  </div>
  ${m.analysis ? `
  <div class="match-analysis">
    <div class="analysis-title">📊 详细分析</div>
    <div class="analysis-text">${m.analysis}</div>
  </div>` : ''}
</div>`;
  }).join('');

  // Summary
  const total = matches.length;
  const avgGoals = matches.reduce((s, m) => s + parseFloat(m.expectedGoals || 0), 0) / total;
  const highConf = matches.filter(m => (m.confidence || 0) >= 70).length;
  document.getElementById('summaryCard').innerHTML = `
<div class="summary-card">
  <div class="summary-title">📈 今日数据汇总</div>
  <div class="summary-stats">
    <div class="stat-item"><div class="stat-value">${total}</div><div class="stat-label">总赛事</div></div>
    <div class="stat-item"><div class="stat-value">${avgGoals.toFixed(1)}</div><div class="stat-label">场均进球</div></div>
    <div class="stat-item"><div class="stat-value">${highConf}</div><div class="stat-label">高信心(≥70%)</div></div>
  </div>
</div>`;
}

async function loadMatches() {
  try {
    const resp = await fetch('data/matches.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderMatches(data);
  } catch (err) {
    console.error('加载赛事失败:', err);
    document.getElementById('matchCards').innerHTML =
      '<div class="no-matches"><div class="no-matches-icon">⚠️</div><div class="no-matches-text">数据加载失败<br>请稍后刷新重试</div></div>';
  }
}

// Load on page ready
loadMatches();
// Auto-refresh every 5 minutes
setInterval(loadMatches, 5 * 60 * 1000);
</script>
</body>
</html>
